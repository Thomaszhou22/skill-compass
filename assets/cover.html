<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
@page { size: 750px 1000px; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 750px;
  height: 1000px;
  background: #000;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.title {
  font-size: 60px;
  font-weight: 900;
  color: #ffffff;
  text-align: center;
  line-height: 1.3;
  letter-spacing: -1px;
  padding: 0 60px;
}
.title .orange {
  color: #ff6b35;
}
.subtitle {
  font-size: 26px;
  color: #8b949e;
  margin-top: 36px;
  font-weight: 500;
  text-align: center;
  padding: 0 80px;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="title">
  你的 AI Skill<br>
  <span class="orange">为什么不触发？</span>
</div>
<div class="subtitle">保姆级教程：教你如何解决 Skill 不触发的问题</div>
</body>
</html>
